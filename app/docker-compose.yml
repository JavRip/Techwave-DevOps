services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=development
      - NAMESPACE=default
    volumes:
      - app-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
