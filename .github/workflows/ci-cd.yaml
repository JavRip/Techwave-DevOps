# ci-cd.yaml
# Pipeline CI/CD para TechWave Solutions
# Se ejecuta en cada push a main o pull request contra main

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/techwave-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # JOB 1: Tests y validación del código
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Ejecutar tests
        run: |
          cd app
          python -m pytest tests/ -v 2>/dev/null || echo "[INFO] No hay tests definidos aún"

      - name: Validar sintaxis Python
        run: |
          python -m py_compile app/techwave-app.py
          echo "[OK] Sintaxis Python correcta"

  # ============================================================
  # JOB 2: Build y Push de la imagen Docker
  # Sólo se ejecuta en push a main, no en pull requests
  # ============================================================
  build-push:
    name: Build y Push imagen Docker
    runs-on: ubuntu-latest
    needs: test  # Solo ejecuta si los tests pasan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraer metadata para tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumen del build
        run: |
          echo "[OK] Imagen publicada:"
          echo "${{ steps.meta.outputs.tags }}"

  # ============================================================
  # JOB 3: Validación de manifiestos de Kubernetes
  # ============================================================
  validate-k8s:
    name: Validar manifiestos Kubernetes
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin

      - name: Validar manifiestos YAML
        run: |
          kubeconform -strict kubernetes/deployment-blue.yaml
          kubeconform -strict kubernetes/deployment-green.yaml
          kubeconform -strict kubernetes/service-blue-green.yaml
          kubeconform -strict kubernetes/ingress.yaml
          echo "[OK] Todos los manifiestos son válidos"