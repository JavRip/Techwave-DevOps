# kind-config.yaml
# Define la topología del clúster local de Kubernetes
# Un nodo control-plane y dos workers es suficiente para simular
# un entorno de producción mínimo con alta disponibilidad básica

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: techwave

nodes:
  - role: control-plane
    # Exponer el puerto 80 y 443 del nodo al host para el Ingress Controller
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker
    labels:
      workload: app      # Etiqueta para dirigir pods de la aplicación a este nodo

  - role: worker
    labels:
      workload: monitoring  # Etiqueta para dirigir pods de monitoreo a este nodo