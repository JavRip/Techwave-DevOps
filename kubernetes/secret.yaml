# secret.yaml
# Los Secrets almacenan datos sensibles en base64.
# IMPORTANTE: en producción nunca se commitean al repositorio.
# Se gestionan con herramientas como Sealed Secrets, Vault o External Secrets.

apiVersion: v1
kind: Secret
metadata:
  name: techwave-secret
  namespace: techwave
type: Opaque
data:
  # Valores en base64. Para codificar: echo -n "valor" | base64
  SECRET_KEY: dGVjaHdhdmUtc2VjcmV0LWtleQ==   # "techwave-secret-key"
  APP_TOKEN: dGVjaHdhdmUtdG9rZW4=             # "techwave-token"