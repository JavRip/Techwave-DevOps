# deployment-green.yaml
# Versión "green" — la nueva versión pendiente de activar
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techwave-app-green
  namespace: techwave
  labels:
    app: techwave-app
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techwave-app
      version: green
  template:
    metadata:
      labels:
        app: techwave-app
        version: green
    spec:
      containers:
        - name: techwave-app
          image: javrip/techwave-app:latest  # en producción sería la nueva versión
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: techwave-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: techwave-secret
                  key: SECRET_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3