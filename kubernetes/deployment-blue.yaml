# deployment-blue.yaml
# Versión "blue" — la versión actualmente en producción
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techwave-app-blue
  namespace: techwave
  labels:
    app: techwave-app
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techwave-app
      version: blue
  template:
    metadata:
      labels:
        app: techwave-app
        version: blue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: techwave-app
          image: javrip/techwave-app:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: techwave-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: techwave-secret
                  key: SECRET_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3