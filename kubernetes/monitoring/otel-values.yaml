# otel-values.yaml
# Configuración del OpenTelemetry Collector
# Recibe trazas de la aplicación y las exporta a Prometheus y logs a Loki
image:
  repository: otel/opentelemetry-collector-contrib

mode: deployment

config:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317
    prometheus:
      config:
        scrape_configs:
          - job_name: techwave-otel
            static_configs:
              - targets: ['techwave-service.techwave.svc.cluster.local:80']

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1000
    memory_limiter:
      limit_mib: 128
      spike_limit_mib: 32
      check_interval: 5s

  exporters:
    prometheus:
      endpoint: 0.0.0.0:8889
    debug:
      verbosity: basic

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug]
      metrics:
        receivers: [prometheus]
        processors: [memory_limiter, batch]
        exporters: [prometheus]